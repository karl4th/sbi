model:
  # vocab_size is set dynamically from dataset at runtime
  max_seq_len: 256
  n_layers: 12
  n_heads: 12
  d_model: 768
  d_ff: 3072
  dropout: 0.1

memory:
  fingerprint_dim: 128
  max_memory_size: 10000
  hebbian_lr: 0.01
  decay_rate: 0.999
  min_confidence: 0.6
  compression_threshold: 200
  top_k: 8
  use_learned_fingerprint: false

training:
  init_from_baseline: false
  baseline_checkpoint: experiments/checkpoints/baseline_best.pt
  batch_size: 64
  learning_rate: 3.0e-4
  weight_decay: 0.1
  max_steps: 10000
  warmup_steps: 500
  grad_clip: 1.0
  eval_every: 500
  save_every: 1000

data:
  task_ids: [1, 2, 3]
  max_seq_len: 256
  size_per_task: null

logging:
  log_every: 50
  experiment_name: sbi_scratch
